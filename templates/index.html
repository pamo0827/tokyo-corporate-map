<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>企業情報マップ</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
        
        /* Split layout: list panel (left) + map (right) */
        #app {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        #list-panel {
            width: 40%;
            min-width: 0;
            display: flex;
            flex-direction: column;
            background: #fff;
            box-sizing: border-box;
        }

        #right-pane {
            flex: 1;
            min-width: 0;
            position: relative;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        /* 地図/詳細 切り替えタブ（最小限） */
        #view-toggle {
            position: absolute;
            top: 10px;
            right: 12px;
            z-index: 1100;
            display: flex;
            border: 1px solid #d7dce5;
            border-radius: 6px;
            overflow: hidden;
        }
        #view-toggle button {
            border: none;
            background: #fff;
            color: #888;
            padding: 6px 14px;
            font-size: 13px;
            cursor: pointer;
        }
        #view-toggle button.active {
            background: #eef0f3;
            color: #222;
            font-weight: 600;
        }

        /* 詳細パネル（地図に重ねて表示） */
        #detail-panel {
            position: absolute;
            inset: 0;
            background: #fff;
            overflow-y: auto;
            z-index: 1000;
        }
        #detail-panel.hidden { display: none; }

        /* データ提供元バッジ（どのAPIか） */
        .src-badge {
            flex-shrink: 0;
            font-size: 9px;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 9px;
            letter-spacing: 0.02em;
        }
        .src-badge.gbiz { background: #eef0ff; color: #5566d6; }
        .src-badge.edinet { background: #e7f6ec; color: #1f8f4e; }

        #detail-content { padding: 48px 18px 28px; }
        .detail-name {
            font-size: 18px; font-weight: 700; color: #2a2f3a; margin-bottom: 12px;
        }
        .dual-sec {
            margin-bottom: 22px;
            border: 1px solid #eef0f3;
            border-radius: 8px;
            overflow: hidden;
        }
        .d-head {
            display: flex; align-items: center; gap: 8px;
            padding: 8px 10px;
            background: #f7f8fb;
            border-bottom: 1px solid #eef0f3;
        }
        .dual-sec > .kv,
        .dual-sec > .detail-empty,
        .dual-sec > .detail-loading { margin: 8px 10px; }
        .detail-head {
            display: flex; align-items: baseline; gap: 10px;
            flex-wrap: wrap; margin-bottom: 12px;
        }
        .detail-empty { color: #888; font-size: 13px; line-height: 1.7; }
        .detail-loading { color: #667eea; font-size: 13px; }
        .detail-badge {
            font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 600;
        }
        .detail-badge.cached { background: #eef0f3; color: #777; }
        .detail-badge.live { background: #e7f6ec; color: #1f8f4e; }

        /* 全フィールドのネスト表示 */
        table.kv { width: 100%; border-collapse: collapse; }
        table.kv > tbody > tr > th,
        table.kv > tbody > tr > td {
            text-align: left;
            padding: 6px 8px;
            border-bottom: 1px solid #f0f2f5;
            font-size: 12.5px;
            vertical-align: top;
        }
        table.kv > tbody > tr > th {
            color: #667eea;
            font-weight: 600;
            white-space: normal;
            width: 17em;
            min-width: 12em;
            max-width: 17em;
            word-break: break-word;
        }
        table.kv > tbody > tr > td { color: #333; line-height: 1.55; word-break: break-word; }
        table.kv table.kv { margin: 2px 0; }      /* ネストは少し詰める */
        .arr-item {
            padding: 4px 0;
            border-bottom: 1px dashed #e3e6ec;
        }
        .arr-item:last-child { border-bottom: none; }
        #detail-content a { color: #4361ee; }
        .muted { color: #aaa; }

        /* 一覧と地図の境界（ドラッグでサイズ変更） */
        #resizer {
            flex: 0 0 6px;
            background: #e1e5e9;
            cursor: col-resize;
            position: relative;
            transition: background-color 0.2s ease;
            touch-action: none;
        }

        #resizer:hover,
        #resizer.dragging {
            background: #667eea;
        }

        #resizer::after {
            content: '◀▶';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 10px;
            letter-spacing: -1px;
            color: #fff;
            background: #667eea;
            padding: 8px 3px;
            border-radius: 4px;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.15s ease;
            pointer-events: none;
        }

        #resizer:hover::after,
        #resizer.dragging::after {
            opacity: 1;
        }

        #list-search {
            flex-shrink: 0;
            padding: 10px 12px;
            border-bottom: 1px solid #eee;
            background: #fafbff;
        }

        #search-input {
            width: 100%;
            box-sizing: border-box;
            padding: 9px 12px;
            border: 1.5px solid #dfe3ea;
            border-radius: 8px;
            font-size: 13px;
            -webkit-user-select: text;
            -moz-user-select: text;
            -ms-user-select: text;
            user-select: text;
        }

        #search-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
        }

        #company-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 12px 12px;
        }

        /* あかさたな 折りたたみセクション */
        .kana-header {
            display: flex;
            align-items: center;
            gap: 8px;
            position: sticky;
            top: 0;
            background: #f3f4f8;
            border-bottom: 1px solid #e1e5e9;
            padding: 9px 10px;
            cursor: pointer;
            user-select: none;
            z-index: 1;
        }
        .kana-header:hover { background: #eceef5; }
        .kana-arrow {
            font-size: 9px;
            color: #888;
            transition: transform 0.15s ease;
        }
        .kana-group.open .kana-arrow { transform: rotate(90deg); }
        .kana-label { font-weight: 700; color: #444; font-size: 13px; flex: 1; }
        .kana-count {
            font-size: 11px;
            color: #888;
            background: #fff;
            border-radius: 9px;
            padding: 1px 8px;
        }
        .kana-body { display: none; }
        .kana-group.open .kana-body { display: block; }

        .search-result-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 8px 10px;
            cursor: pointer;
            border-bottom: 1px solid #f0f0f0;
            transition: background-color 0.15s ease;
        }

        .search-result-name {
            font-weight: 600;
            color: #333;
            font-size: 12px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .search-result-item:last-child { border-bottom: none; }
        .search-result-item:hover {
            background-color: #f8f9ff;
        }
        .search-result-item.selected {
            background-color: #eef0ff;
        }

        .list-empty {
            padding: 24px 12px;
            color: #888;
            text-align: center;
            font-size: 12px;
        }

        /* Custom scrollbar */
        #company-list::-webkit-scrollbar {
            width: 6px;
        }

        #company-list::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 3px;
        }

        #company-list::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 3px;
        }

        #company-list::-webkit-scrollbar-thumb:hover {
            background: #a8a8a8;
        }

        /* Mobile Responsive Styles */
        @media (max-width: 768px) {
            /* 縦積み: 一覧（上）+ 地図（下） */
            #app {
                flex-direction: column;
            }

            #list-panel {
                width: 100%;
                max-width: none;
                height: 40%;
            }

            #map {
                width: 100%;
                height: 60%;
            }

            #resizer {
                flex: 0 0 6px;
                width: 100%;
                cursor: row-resize;
            }

            #resizer::after {
                content: '▲▼';
                letter-spacing: 0;
                writing-mode: horizontal-tb;
            }

            .search-result-item {
                padding: 10px 8px;
            }

            .search-result-name {
                font-size: 13px;
            }

            /* Touch-friendly hover effects */
            .search-result-item:hover,
            .search-result-item:active {
                background-color: #f0f4ff;
                transform: none;
            }
        }

        /* Extra small devices (phones in portrait) */
        @media (max-width: 480px) {
            .search-result-item {
                padding: 9px 6px;
            }

            .search-result-name {
                font-size: 12px;
            }
        }

        /* Landscape mode adjustments for mobile */
        @media (max-width: 768px) and (orientation: landscape) {
            #list-panel {
                height: 50%;
            }

            #map {
                height: 50%;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <div id="list-panel">
            <div id="list-search">
                <input type="text" id="search-input" placeholder="企業名・住所で検索" autocomplete="off">
            </div>
            <div id="company-list"></div>
        </div>

        <div id="resizer" title="ドラッグで幅を変更"></div>

        <div id="right-pane">
            <div id="view-toggle">
                <button type="button" data-view="detail" class="active">詳細</button>
                <button type="button" data-view="map">地図</button>
            </div>
            <div id="map"></div>
            <div id="detail-panel">
                <div id="detail-content">
                    <div class="detail-empty">左上の検索または一覧から企業を選ぶと、ここに取得できる全情報を表示します。</div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="/static/js/main.js"></script>
</body>
</html>
